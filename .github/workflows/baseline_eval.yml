name: Baseline Evaluation

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"

      - name: Run baseline evaluations
        run: |
          python scripts/run_baselines.py --max-samples 100 --verbose
        timeout-minutes: 120

      - name: Export leaderboard
        run: |
          python scripts/export_leaderboard.py --format markdown
          python scripts/export_leaderboard.py --format csv

      - name: Commit updated leaderboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leaderboard/
          git diff --staged --quiet || git commit -m "Update leaderboard [automated]"
          git push
